# Build and run:
#   docker compose -f docker/docker-compose.yml up --build
#
# Or use the convenience scripts from project root:
#   ./scripts/start.sh        # Linux/macOS
#   scripts\start.bat         # Windows
#
# Seed workspace by uncommenting the volumes line below.
#
# Data is stored outside the project tree (defaults to ~/.auroracoder/).
# Override via environment variables or a .env file:
#   AURORACODER_DATA_DIR=~/my-custom-path/data
#   AURORACODER_WORKSPACE_DIR=~/my-custom-path/workspace
#   AURORACODER_SESSIONS_DIR=~/my-custom-path/sessions

services:
  agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8080:8080"
      - "3000:3000"  # Frontend — always on 3000-series port
      - "6080:6080"
      - "8765:8765"  # ToolStore management UI
      - "8900-8902:8900-8902"
    env_file:
      - ../.env
    environment:
      - AURORACODER_DOCKER=1
      - AURORACODER_VNC=1
    volumes:
      # Docker socket — required for docker-type ToolStore tools (DinD)
      - /var/run/docker.sock:/var/run/docker.sock
      # Host bind mounts — stored outside the project tree
      - ${AURORACODER_DATA_DIR:-~/.auroracoder/data}:/app/data
      - ${AURORACODER_WORKSPACE_DIR:-~/.auroracoder/workspace}:/workspace
      - ${AURORACODER_SESSIONS_DIR:-~/.auroracoder/sessions}:/root/.auroracoder_sessions
      # Seed workspace (optional): uncomment below
      # - ./my-project:/seed:ro
