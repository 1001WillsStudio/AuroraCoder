[supervisord]
nodaemon=true
logfile=/tmp/supervisord.log
pidfile=/tmp/supervisord.pid

[program:xvfb]
command=Xvfb :99 -screen 0 1280x720x24 -ac
autorestart=true
priority=10

[program:fluxbox]
command=fluxbox
environment=DISPLAY=":99"
autorestart=true
priority=20

[program:x11vnc]
command=x11vnc -display :99 -forever -nopw -shared -rfbport 5900
autorestart=true
priority=30

[program:novnc]
command=websockify --web /usr/share/novnc 6080 localhost:5900
autorestart=true
priority=40

[program:agent]
command=conda run --no-capture-output -n agent python run_web.py
directory=/app
environment=DISPLAY=":99",THINKTOOL_DOCKER="1",THINKTOOL_VNC="1"
autorestart=true
priority=50
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:conversation_gateway]
command=conda run --no-capture-output -n agent python -m uvicorn conversation_gateway.api:app --host 0.0.0.0 --port 8081 --log-level info
directory=/app
environment=BACKEND_URL="http://localhost:8080"
autorestart=true
priority=55
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
