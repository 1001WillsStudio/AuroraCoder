name: Build & Release Launcher

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag to release (e.g. v0.0.13)'
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  build:
    name: Build launcher binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            ext: ""
          - os: linux
            arch: arm64
            ext: ""
          - os: darwin
            arch: amd64
            ext: ""
          - os: darwin
            arch: arm64
            ext: ""
          - os: windows
            arch: amd64
            ext: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: launcher/go.sum

      - name: Install rsync
        run: sudo apt-get update -qq && sudo apt-get install -y -qq rsync

      - name: Prepare embed directory
        run: |
          mkdir -p launcher/embed
          rsync -av \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='dist' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='*.pyo' \
            --exclude='data' \
            --exclude='workspace' \
            --exclude='sessions' \
            --exclude='.env' \
            --exclude='launcher' \
            --exclude='docs' \
            --exclude='*.egg-info' \
            --exclude='.mypy_cache' \
            --exclude='.pytest_cache' \
            --exclude='.search_cache' \
            --exclude='*.log' \
            --exclude='.cursor' \
            --exclude='.idea' \
            --exclude='.vscode' \
            --exclude='*.swp' \
            --exclude='*.swo' \
            --exclude='*.map' \
            --exclude='.github' \
            ./ launcher/embed/

      - name: Add Windows VERSIONINFO resource
        if: matrix.os == 'windows'
        run: |
          cd launcher

          # Install goversioninfo tool
          go install github.com/josephspurrier/goversioninfo/cmd/goversioninfo@latest

          # Create version info JSON (provides proper metadata for SmartScreen)
          cat > versioninfo.json << 'VEOF'
          {
            "FixedFileInfo": {
              "FileVersion": {
                "Major": 1, "Minor": 0, "Patch": 0, "Build": 0
              },
              "ProductVersion": {
                "Major": 1, "Minor": 0, "Patch": 0, "Build": 0
              },
              "FileFlagsMask": "3f",
              "FileFlags": "00",
              "FileOS": "040004",
              "FileType": "01",
              "FileSubType": "00"
            },
            "StringFileInfo": {
              "Comments": "AuroraCoder One-Click Launcher - Agentic coding environment",
              "CompanyName": "1001WillsStudio",
              "FileDescription": "AuroraCoder Launcher",
              "FileVersion": "1.0.0.0",
              "InternalName": "AuroraCoder",
              "LegalCopyright": "MIT License",
              "OriginalFilename": "AuroraCoder-windows.exe",
              "ProductName": "AuroraCoder",
              "ProductVersion": "1.0.0.0"
            },
            "VarFileInfo": {
              "Translation": {
                "LangID": "0409",
                "CharsetID": "04B0"
              }
            }
          }
          VEOF

          goversioninfo -64 -platform-specific=false -o resource_windows.syso versioninfo.json
          echo "✅ Generated resource_windows.syso with VERSIONINFO metadata"

      - name: Build binary (${{ matrix.os }}-${{ matrix.arch }})
        run: |
          cd launcher
          # Friendly name: auroracoder-{os} with -arm64 suffix for non-amd64
          BASE="auroracoder-${{ matrix.os }}"
          if [ "${{ matrix.arch }}" != "amd64" ]; then
            BASE="${BASE}-${{ matrix.arch }}"
          fi
          OUTPUT="${BASE}${{ matrix.ext }}"
          GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} CGO_ENABLED=0 \
            go build -trimpath -ldflags="-s -w" -o "$OUTPUT" .
          echo "BINARY=$OUTPUT" >> $GITHUB_ENV
          ls -lh "$OUTPUT"

      # ── Windows: package .exe in .zip (dramatically reduces browser download blocks) ──
      - name: Package Windows binary in ZIP
        if: matrix.os == 'windows'
        run: |
          cd launcher
          ZIP_NAME="auroracoder-windows.zip"
          zip "$ZIP_NAME" "${{ env.BINARY }}"
          echo "BINARY=$ZIP_NAME" >> $GITHUB_ENV
          ls -lh "$ZIP_NAME"
          echo "✅ Packaged Windows binary in ZIP: $ZIP_NAME"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: auroracoder-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            launcher/${{ env.BINARY }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifact directory
        run: |
          mkdir -p dist
          find artifacts -type f -exec cp {} dist/ \;
          echo "Release assets:"
          ls -lh dist/

      - name: Determine tag name
        id: tag
        run: |
          if [ -n "${{ inputs.tag_name }}" ]; then
            echo "tag=${{ inputs.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: dist/*
          draft: true
          generate_release_notes: true
          body: |
            ## Install

            **Windows** — download `auroracoder-windows.zip`, extract, run `auroracoder-windows.exe`.
            > If SmartScreen warns: **More info → Run anyway**.

            **macOS (Apple Silicon)** —
            ```bash
            xattr -d com.apple.quarantine ./auroracoder-darwin-arm64
            chmod +x ./auroracoder-darwin-arm64
            ./auroracoder-darwin-arm64
            ```

            **macOS (Intel)** —
            ```bash
            xattr -d com.apple.quarantine ./auroracoder-darwin-amd64
            chmod +x ./auroracoder-darwin-amd64
            ./auroracoder-darwin-amd64
            ```

            **Linux** —
            ```bash
            chmod +x ./auroracoder-linux-amd64
            ./auroracoder-linux-amd64
            ```

            Requires [Docker](https://docs.docker.com/get-docker/).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
