name: Build & Release Launcher

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag to release (e.g. v0.0.13)'
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  build:
    name: Build launcher binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            ext: ""
          - os: linux
            arch: arm64
            ext: ""
          - os: darwin
            arch: amd64
            ext: ""
          - os: darwin
            arch: arm64
            ext: ""
          - os: windows
            arch: amd64
            ext: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: false

      - name: Install rsync
        run: sudo apt-get update -qq && sudo apt-get install -y -qq rsync

      - name: Prepare embed directory
        run: |
          mkdir -p launcher/embed
          rsync -av \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='dist' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='*.pyo' \
            --exclude='data' \
            --exclude='workspace' \
            --exclude='sessions' \
            --exclude='.env' \
            --exclude='launcher' \
            --exclude='docs' \
            --exclude='*.egg-info' \
            --exclude='.mypy_cache' \
            --exclude='.pytest_cache' \
            --exclude='.search_cache' \
            --exclude='*.log' \
            --exclude='.cursor' \
            --exclude='.idea' \
            --exclude='.vscode' \
            --exclude='*.swp' \
            --exclude='*.swo' \
            --exclude='*.map' \
            --exclude='.github' \
            ./ launcher/embed/

      - name: Add Windows VERSIONINFO resource
        if: matrix.os == 'windows'
        run: |
          cd launcher

          # Install goversioninfo tool
          go install github.com/josephspurrier/goversioninfo/cmd/goversioninfo@latest

          # Create version info JSON (provides proper metadata for SmartScreen)
          cat > versioninfo.json << 'VEOF'
          {
            "FixedFileInfo": {
              "FileVersion": {
                "Major": 1, "Minor": 0, "Patch": 0, "Build": 0
              },
              "ProductVersion": {
                "Major": 1, "Minor": 0, "Patch": 0, "Build": 0
              },
              "FileFlagsMask": "3f",
              "FileFlags": "00",
              "FileOS": "040004",
              "FileType": "01",
              "FileSubType": "00"
            },
            "StringFileInfo": {
              "Comments": "AuroraCoder One-Click Launcher - Agentic coding environment",
              "CompanyName": "1001WillsStudio",
              "FileDescription": "AuroraCoder Launcher",
              "FileVersion": "1.0.0.0",
              "InternalName": "AuroraCoder",
              "LegalCopyright": "MIT License",
              "OriginalFilename": "AuroraCoder-windows.exe",
              "ProductName": "AuroraCoder",
              "ProductVersion": "1.0.0.0"
            },
            "VarFileInfo": {
              "Translation": {
                "LangID": "0409",
                "CharsetID": "04B0"
              }
            }
          }
          VEOF

          goversioninfo -64 -platform-specific=false -o resource_windows.syso versioninfo.json
          echo "✅ Generated resource_windows.syso with VERSIONINFO metadata"

      - name: Build CPU binary (${{ matrix.os }}-${{ matrix.arch }})
        run: |
          cd launcher
          FRIENDLY="${{ matrix.os }}"
          if [ "$FRIENDLY" = "darwin" ]; then FRIENDLY="macos"; fi
          BASE="auroracoder-${FRIENDLY}"
          if [ "${{ matrix.arch }}" != "amd64" ]; then
            BASE="${BASE}-${{ matrix.arch }}"
          fi
          CPU_OUTPUT="${BASE}${{ matrix.ext }}"
          GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} CGO_ENABLED=0 \
            go build -trimpath -ldflags="-s -w" -o "$CPU_OUTPUT" .
          echo "CPU_OUTPUT=$CPU_OUTPUT" >> $GITHUB_ENV
          ls -lh "$CPU_OUTPUT"

      - name: Build GPU binary (${{ matrix.os }}-${{ matrix.arch }})
        run: |
          cd launcher
          FRIENDLY="${{ matrix.os }}"
          if [ "$FRIENDLY" = "darwin" ]; then FRIENDLY="macos"; fi
          GPU_BASE="auroracoder-gpu-${FRIENDLY}"
          if [ "${{ matrix.arch }}" != "amd64" ]; then
            GPU_BASE="${GPU_BASE}-${{ matrix.arch }}"
          fi
          GPU_OUTPUT="${GPU_BASE}${{ matrix.ext }}"
          GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} CGO_ENABLED=0 \
            go build -trimpath -ldflags="-s -w -X main.gpuMode=true" -o "$GPU_OUTPUT" .
          echo "GPU_OUTPUT=$GPU_OUTPUT" >> $GITHUB_ENV
          ls -lh "$GPU_OUTPUT"

      # ── Windows: package .exe in .zip (dramatically reduces browser download blocks) ──
      - name: Package Windows binary in ZIP
        if: matrix.os == 'windows'
        run: |
          cd launcher
          ZIP_NAME="auroracoder-windows.zip"
          zip "$ZIP_NAME" "${{ env.CPU_OUTPUT }}"
          echo "CPU_OUTPUT=$ZIP_NAME" >> $GITHUB_ENV
          ls -lh "$ZIP_NAME"
          echo "✅ Packaged Windows binaries in ZIP: $ZIP_NAME"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: auroracoder-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            launcher/${{ env.CPU_OUTPUT }}
            launcher/${{ env.GPU_OUTPUT }}
            launcher/auroracoder-*.zip

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (tags only)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifact directory
        run: |
          mkdir -p dist
          find artifacts -type f -exec cp {} dist/ \;
          echo "Release assets:"
          ls -lh dist/

      - name: Package GPU binaries into one zip
        run: |
          GPU_ZIP="auroracoder-gpu.zip"
          mkdir -p gpu-pack
          find dist -name "auroracoder-gpu-*" -exec cp {} gpu-pack/ \;
          find dist -name "auroracoder-gpu-*" -delete
          # Remove individual Windows .exe — already in auroracoder-windows.zip
          if ls gpu-pack/* >/dev/null 2>&1; then
            cd gpu-pack && zip "../dist/${GPU_ZIP}" * && cd ..
            echo "✅ Packaged GPU binaries: ${GPU_ZIP}"
          fi
          rm -rf gpu-pack
          echo ""
          echo "Final release assets:"
          ls -lh dist/

      - name: Determine tag name
        id: tag
        run: |
          if [ -n "${{ inputs.tag_name }}" ]; then
            echo "tag=${{ inputs.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Read tag annotation as changelog
        id: changelog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          REPO="${{ github.repository }}"

          # Get tag SHA from GitHub API
          TAG_SHA=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/$REPO/git/ref/tags/$TAG" | \
            python3 -c "import sys,json; print(json.load(sys.stdin).get('object',{}).get('sha',''))")

          if [ -n "$TAG_SHA" ] && [ "$TAG_SHA" != "" ]; then
            # Fetch the tag object to get the annotation message
            TAG_MSG=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
              "https://api.github.com/repos/$REPO/git/tags/$TAG_SHA" | \
              python3 -c "import sys,json; print(json.load(sys.stdin).get('message',''))")
            echo "Read tag annotation from GitHub API (${#TAG_MSG} chars)"
          else
            echo "Tag $TAG not found via API, falling back to git"
            TAG_MSG=$(git tag -l --format='%(contents)' "$TAG" 2>/dev/null || true)
          fi

          # Generate auto-release notes via GitHub API
          GEN_NOTES=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
            -X POST \
            "https://api.github.com/repos/$REPO/releases/generate-notes" \
            -d "{\"tag_name\":\"$TAG\"}" | \
            python3 -c "import sys,json; print(json.load(sys.stdin).get('body',''))")

          # Build release body: all changelog together in one fold, then install
          printf '<details>\n<summary><strong>📋 Release Notes</strong></summary>\n\n' > /tmp/release_body.md
          printf '%s\n' "$TAG_MSG" >> /tmp/release_body.md
          printf '\n---\n\n%s\n' "$GEN_NOTES" >> /tmp/release_body.md
          printf '\n</details>\n\n' >> /tmp/release_body.md
          cat >> /tmp/release_body.md << 'INSTALLOF'
          ## Install

          **Windows** — download `auroracoder-windows.zip`, extract, run `auroracoder-windows.exe`.
          > If SmartScreen warns: **More info → Run anyway**.

          **macOS (Apple Silicon)** —
          ```bash
          xattr -d com.apple.quarantine ./auroracoder-macos-arm64
          chmod +x ./auroracoder-macos-arm64
          ./auroracoder-macos-arm64
          ```

          **macOS (Intel)** —
          ```bash
          xattr -d com.apple.quarantine ./auroracoder-macos
          chmod +x ./auroracoder-macos
          ./auroracoder-macos
          ```

          **Linux** —
          ```bash
          chmod +x ./auroracoder-linux
          ./auroracoder-linux
          ```

          **GPU (NVIDIA)** — download `auroracoder-gpu.zip`, extract, and run the binary for your platform. Requires `nvidia-container-toolkit`.

          Requires [Docker](https://docs.docker.com/get-docker/).
          INSTALLOF
          echo "=== Release body preview ==="
          head -c 2000 /tmp/release_body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: dist/*
          draft: true
          generate_release_notes: false
          body_path: /tmp/release_body.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
