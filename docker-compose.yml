# Without VNC:  docker compose up --build
# With VNC:     docker compose --profile vnc up --build
#
# Seed workspace by uncommenting the volumes line below.

services:
  agent:
    build: .
    ports:
      - "8080:8080"
      - "8888-8890:8888-8890"
    environment:
      - THINKTOOL_DOCKER=1
    # volumes:
    #   - ./my-project:/seed:ro

  agent-vnc:
    profiles: ["vnc"]
    build: .
    ports:
      - "8080:8080"
      - "8888-8890:8888-8890"
      - "6080:6080"
    environment:
      - THINKTOOL_DOCKER=1
      - THINKTOOL_VNC=1
    # volumes:
    #   - ./my-project:/seed:ro
