# First time:  docker build -t thinkwithtool-base -f Dockerfile.base .
# Then:        docker compose up --build
#
# Seed workspace by uncommenting the volumes line below.
#
# Data is stored outside the project tree (defaults to ~/.thinktool/).
# Override via environment variables or a .env file:
#   THINKTOOL_DATA_DIR=~/my-custom-path/data
#   THINKTOOL_WORKSPACE_DIR=~/my-custom-path/workspace
#   THINKTOOL_SESSIONS_DIR=~/my-custom-path/sessions

services:
  agent:
    build: .
    ports:
      - "8080:8080"
      - "8081:8081"
      - "6080:6080"
      - "8900-8902:8900-8902"
    env_file:
      - .env
    environment:
      - THINKTOOL_DOCKER=1
      - THINKTOOL_VNC=1
    volumes:
      # Docker socket — required for docker-type ToolStore tools (DinD)
      - /var/run/docker.sock:/var/run/docker.sock
      # Host bind mounts — stored outside the project tree
      - ${THINKTOOL_DATA_DIR:-~/.thinktool/data}:/app/data
      - ${THINKTOOL_WORKSPACE_DIR:-~/.thinktool/workspace}:/workspace
      - ${THINKTOOL_SESSIONS_DIR:-~/.thinktool/sessions}:/root/.thinktool_sessions
      # Seed workspace (optional): uncomment below
      # - ./my-project:/seed:ro
