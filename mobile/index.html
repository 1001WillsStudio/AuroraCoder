<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0d1117">
  <meta name="description" content="AuroraCoder — Mobile">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>🧠</text></svg>">
  <title>AuroraCoder</title>
  <link rel="stylesheet" href="/mobile/css/mobile.css">
</head>
<body>
  <!-- ================================================================== -->
  <!-- Login Screen                                                       -->
  <!-- ================================================================== -->
  <div id="login-screen" class="screen active">
    <div class="login-container">
      <div class="login-icon">🧠</div>
      <h1 class="login-title">AuroraCoder</h1>
      <p class="login-subtitle">Secure access required</p>
      <form id="login-form" class="login-form">
        <div class="input-group">
          <label for="password-input" class="input-label">Access Password</label>
          <input type="password" id="password-input" class="login-password-input"
                 placeholder="Enter your access password" autocomplete="current-password" autofocus>
          <button type="button" id="toggle-password" class="toggle-password-btn" aria-label="Toggle password visibility">
            <svg id="eye-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <div id="login-error" class="login-error hidden"></div>
        <button type="submit" id="login-btn" class="login-btn">
          <span id="login-btn-text">Unlock</span>
          <span id="login-spinner" class="spinner hidden"></span>
        </button>
      </form>
      <p class="login-footer">Set <code>ACCESS_PASSWORD</code> env var to configure</p>
    </div>
  </div>

  <!-- ================================================================== -->
  <!-- Main Chat App (hidden until authenticated)                         -->
  <!-- ================================================================== -->
  <div id="app-screen" class="screen">
    <!-- Header -->
    <header class="app-header">
      <button id="menu-btn" class="header-btn" aria-label="Menu">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <div class="header-center">
        <span class="header-title">AuroraCoder</span>
        <span id="header-provider" class="header-provider"></span>
      </div>
      <button id="new-chat-btn" class="header-btn" aria-label="New chat">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>
    </header>

    <!-- Status bar (streaming indicator) -->
    <div id="status-bar" class="status-bar hidden">
      <span class="status-dot"></span>
      <span id="status-text" class="status-text">Generating...</span>
      <span id="status-timer" class="status-timer"></span>
    </div>

    <!-- Chat messages area -->
    <main id="chat-area" class="chat-area">
      <!-- Welcome -->
      <div id="welcome-screen" class="welcome-mobile">
        <div class="welcome-icon">🧠</div>
        <h2 class="welcome-heading">What can I help with?</h2>
        <p class="welcome-desc">Ask me anything — I can write code, browse the web, manage files, and more.</p>
      </div>
      <!-- Messages container -->
      <div id="messages-container" class="messages-container"></div>
      <!-- Scroll anchor -->
      <div id="messages-end"></div>
    </main>

    <!-- Continue button -->
    <div id="continue-bar" class="continue-bar hidden">
      <button id="continue-btn" class="continue-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
        </svg>
        Continue Generation
      </button>
    </div>

    <!-- Input area -->
    <div class="input-area">
      <div class="input-container">
        <textarea id="chat-input" class="chat-input" rows="1"
                  placeholder="Type a message..." enterkeyhint="send"
                  autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></textarea>
        <button id="send-btn" class="send-btn" aria-label="Send message">
          <svg id="send-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
        <button id="stop-btn" class="stop-btn hidden" aria-label="Stop generating">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <rect x="4" y="4" width="16" height="16" rx="2"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- ================================================================ -->
    <!-- Side Drawer (Menu)                                               -->
    <!-- ================================================================ -->
    <div id="drawer-overlay" class="drawer-overlay hidden"></div>
    <aside id="drawer" class="drawer">
      <div class="drawer-header">
        <h3 class="drawer-title">Menu</h3>
        <button id="drawer-close-btn" class="drawer-close-btn" aria-label="Close menu">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>

      <!-- Provider selector -->
      <div class="drawer-section">
        <label class="drawer-label">Model</label>
        <select id="provider-select" class="drawer-select"></select>
      </div>

      <!-- Conversations -->
      <div class="drawer-section">
        <div class="drawer-section-header">
          <label class="drawer-label">Conversations</label>
          <button id="refresh-convos-btn" class="drawer-action-btn" aria-label="Refresh conversations">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
            </svg>
          </button>
        </div>
        <div id="conversation-list" class="conversation-list">
          <div class="conversation-list-empty">No conversations yet</div>
        </div>
      </div>

      <!-- Security Status -->
      <div class="drawer-section">
        <label class="drawer-label">Security</label>
        <div id="mobile-security-status" class="drawer-security-status">
          <span id="mobile-security-dot" class="security-dot"></span>
          <span id="mobile-security-text" class="security-text">Checking…</span>
        </div>
        <a href="/" target="_blank" class="drawer-desktop-link" rel="noopener">💻 Open Desktop Version</a>
      </div>

      <!-- Actions -->
      <div class="drawer-section drawer-actions">
        <button id="logout-btn" class="drawer-logout-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Logout
        </button>
      </div>
    </aside>

    <!-- Toast notifications -->
    <div id="toast" class="toast hidden"></div>
  </div>

  <!-- Scripts -->
  <script src="/mobile/js/auth.js"></script>
  <script src="/mobile/js/api.js"></script>
  <script src="/mobile/js/chat.js"></script>
  <script src="/mobile/js/app.js"></script>
</body>
</html>
